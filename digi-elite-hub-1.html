<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DIGI Elite Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap');

:root {
  --bg: #07070b;
  --surface: #0d0d14;
  --surface2: #12121c;
  --border: #1e1e2e;
  --green: #a0ffb8;
  --green-dim: rgba(160,255,184,0.08);
  --green-mid: rgba(160,255,184,0.18);
  --text: #e8e8f0;
  --muted: #5a5a7a;
  --red: #ff6b6b;
  --yellow: #ffd93d;
  --blue: #6eb4ff;
  --orange: #ffab6b;
  --digi-blue: #0078d4;
}

* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Space Mono',monospace; font-size:13px; overflow-x:hidden; }

/* ── LOGIN ── */
#loginScreen {
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:24px;
  background: radial-gradient(ellipse at 50% 0%, rgba(160,255,184,0.06) 0%, transparent 60%);
}
.login-logo { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:var(--green); letter-spacing:-1px; margin-bottom:4px; }
.login-sub { font-size:11px; color:var(--muted); margin-bottom:40px; letter-spacing:2px; text-transform:uppercase; }
.login-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:32px; width:100%; max-width:360px; }
.field { margin-bottom:16px; }
.field label { display:block; font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
.field input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px 14px; color:var(--text); font-family:'Space Mono',monospace; font-size:13px; outline:none; transition:border .2s; }
.field input:focus { border-color:var(--green); }
.btn-login { width:100%; background:var(--green); color:#07070b; border:none; border-radius:8px; padding:13px; font-family:'Syne',sans-serif; font-weight:700; font-size:14px; cursor:pointer; letter-spacing:.5px; transition:opacity .2s; }
.btn-login:hover { opacity:.85; }
.login-err { color:var(--red); font-size:11px; text-align:center; margin-top:12px; display:none; }

/* ── APP SHELL ── */
#app { display:none; min-height:100vh; flex-direction:column; }

/* Header */
.topbar {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 16px; height:52px; display:flex; align-items:center; gap:12px;
  position:sticky; top:0; z-index:100;
}
.topbar-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:15px; color:var(--green); flex:1; }
.topbar-user { font-size:11px; color:var(--muted); }
.topbar-role { font-size:9px; background:var(--green-dim); color:var(--green); border:1px solid var(--green-mid); border-radius:20px; padding:2px 8px; margin-left:6px; letter-spacing:.5px; text-transform:uppercase; }
.btn-logout { background:none; border:1px solid var(--border); border-radius:6px; color:var(--muted); font-family:'Space Mono',monospace; font-size:10px; padding:4px 10px; cursor:pointer; }
.btn-logout:hover { color:var(--red); border-color:var(--red); }

/* Nav bottom */
.nav-bottom {
  position:fixed; bottom:0; left:0; right:0; background:var(--surface);
  border-top:1px solid var(--border); display:flex; z-index:100;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; padding:10px 4px 8px; background:none; border:none; color:var(--muted); font-family:'Space Mono',monospace; font-size:9px; cursor:pointer; gap:4px; transition:color .15s; letter-spacing:.3px; }
.nav-btn svg { width:20px; height:20px; }
.nav-btn.active { color:var(--green); }
.nav-btn.active svg { filter: drop-shadow(0 0 6px rgba(160,255,184,0.5)); }

/* Main content */
.main { flex:1; padding:16px 16px 80px; max-width:600px; margin:0 auto; width:100%; }

/* Pages */
.page { display:none; }
.page.active { display:block; }

/* Section title */
.sec-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; color:var(--text); margin-bottom:4px; }
.sec-sub { font-size:11px; color:var(--muted); margin-bottom:20px; }

/* Cards */
.card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; }
.card-title { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }

/* Stats grid */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; }
.stat-num { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; color:var(--green); line-height:1; }
.stat-label { font-size:10px; color:var(--muted); margin-top:4px; }
.stat-card.red .stat-num { color:var(--red); }
.stat-card.yellow .stat-num { color:var(--yellow); }
.stat-card.blue .stat-num { color:var(--blue); }

/* Patamar badge */
.patamar-badge { background:var(--green-dim); border:1px solid var(--green-mid); border-radius:8px; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.patamar-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.patamar-val { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; color:var(--green); }
.patamar-rates { display:flex; gap:12px; margin-top:6px; }
.patamar-rate { font-size:10px; color:var(--muted); }
.patamar-rate span { color:var(--green); font-weight:700; }

/* Btn */
.btn { display:inline-flex; align-items:center; gap:6px; font-family:'Space Mono',monospace; font-size:12px; padding:10px 18px; border-radius:8px; border:none; cursor:pointer; font-weight:700; transition:all .15s; letter-spacing:.3px; }
.btn-primary { background:var(--green); color:#07070b; }
.btn-primary:hover { opacity:.85; }
.btn-secondary { background:var(--surface2); color:var(--green); border:1px solid var(--green-mid); }
.btn-secondary:hover { background:var(--green-dim); }
.btn-danger { background:var(--surface2); color:var(--red); border:1px solid rgba(255,107,107,.2); }
.btn-sm { padding:6px 12px; font-size:11px; }
.btn-full { width:100%; justify-content:center; }

/* Check-in card */
.checkin-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; text-align:center; margin-bottom:16px; }
.checkin-time { font-family:'Syne',sans-serif; font-size:40px; font-weight:800; color:var(--green); letter-spacing:-2px; }
.checkin-date { font-size:11px; color:var(--muted); margin-bottom:20px; }
.checkin-status { display:inline-block; font-size:10px; padding:4px 12px; border-radius:20px; margin-bottom:20px; font-weight:700; letter-spacing:.5px; }
.checkin-status.in { background:rgba(160,255,184,.15); color:var(--green); border:1px solid var(--green-mid); }
.checkin-status.out { background:rgba(90,90,122,.15); color:var(--muted); border:1px solid var(--border); }

/* Form */
.form-group { margin-bottom:14px; }
.form-label { display:block; font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
.form-input, .form-select, .form-textarea {
  width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px;
  padding:11px 14px; color:var(--text); font-family:'Space Mono',monospace; font-size:12px; outline:none; transition:border .2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--green); }
.form-textarea { resize:vertical; min-height:80px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* Table */
.table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:10px; margin-bottom:16px; }
table { width:100%; border-collapse:collapse; font-size:11px; min-width:400px; }
thead th { background:var(--surface2); padding:10px 12px; text-align:left; font-size:10px; color:var(--green); letter-spacing:.8px; text-transform:uppercase; white-space:nowrap; border-bottom:1px solid var(--border); }
tbody tr { border-bottom:1px solid var(--border); }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:rgba(255,255,255,.02); }
tbody td { padding:9px 12px; color:var(--text); white-space:nowrap; }

/* Status badges */
.badge { display:inline-block; font-size:9px; padding:2px 8px; border-radius:20px; font-weight:700; letter-spacing:.3px; }
.badge-validado { background:rgba(160,255,184,.15); color:var(--green); }
.badge-novo { background:rgba(110,180,255,.15); color:var(--blue); }
.badge-incompleto { background:rgba(255,217,61,.15); color:var(--yellow); }
.badge-cancelado { background:rgba(255,107,107,.15); color:var(--red); }
.badge-outro { background:rgba(90,90,122,.15); color:var(--muted); }

/* Finance summary */
.finance-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
.finance-row:last-child { border-bottom:none; }
.finance-label { font-size:11px; color:var(--muted); }
.finance-val { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; }
.finance-val.green { color:var(--green); }
.finance-val.blue { color:var(--blue); }
.finance-val.red { color:var(--red); }
.finance-val.yellow { color:var(--yellow); }

/* Ranking */
.ranking-item { display:flex; align-items:center; gap:12px; padding:14px; background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; }
.rank-pos { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; min-width:36px; text-align:center; }
.rank-pos.gold { color:#ffd700; text-shadow:0 0 12px rgba(255,215,0,.4); }
.rank-pos.silver { color:#c0c0c0; }
.rank-pos.bronze { color:#cd7f32; }
.rank-name { flex:1; font-size:13px; font-weight:700; }
.rank-val { font-size:12px; color:var(--green); font-weight:700; }
.rank-sub { font-size:10px; color:var(--muted); }

/* Toast */
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--surface); border:1px solid var(--green-mid); color:var(--green); padding:10px 20px; border-radius:8px; font-size:12px; font-weight:700; z-index:999; opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; }
.toast.err { border-color:rgba(255,107,107,.3); color:var(--red); }
.toast.show { opacity:1; }

/* Loading */
.loading { text-align:center; padding:40px; color:var(--muted); font-size:12px; }
.spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:10px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Divider */
.divider { border:none; border-top:1px solid var(--border); margin:16px 0; }

/* Section header row */
.sec-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }

/* Empty state */
.empty { text-align:center; padding:40px 20px; color:var(--muted); }
.empty-icon { font-size:32px; margin-bottom:8px; }
.empty-text { font-size:12px; }

/* Tabs */
.tabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
.tab { font-family:'Space Mono',monospace; font-size:10px; padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--muted); cursor:pointer; transition:all .15s; letter-spacing:.3px; }
.tab.active { border-color:var(--green); color:var(--green); background:var(--green-dim); }

/* Admin user list */
.user-item { display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; }
.user-avatar { width:36px; height:36px; background:var(--green-dim); border:1px solid var(--green-mid); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:14px; color:var(--green); }
.user-info { flex:1; }
.user-name { font-size:13px; font-weight:700; }
.user-email { font-size:10px; color:var(--muted); }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(7,7,11,.85); z-index:200; display:none; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:16px 16px 0 0; width:100%; max-width:520px; padding:24px; padding-bottom:calc(24px + env(safe-area-inset-bottom)); max-height:90vh; overflow-y:auto; }
.modal-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; margin-bottom:20px; }
.modal-close { float:right; background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:0 4px; }

/* PDF cert preview */
.cert-preview { background:linear-gradient(135deg,#07070b,#0d1a0d); border:2px solid var(--green); border-radius:12px; padding:32px; text-align:center; margin-bottom:16px; }
.cert-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--green); margin-bottom:4px; }
.cert-sub { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:24px; }
.cert-pos { font-size:52px; margin-bottom:8px; }
.cert-name { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; color:var(--text); margin-bottom:8px; }
.cert-detail { font-size:12px; color:var(--muted); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-logo">⚡ DIGI Elite Hub</div>
  <div class="login-sub">Plataforma de Equipa</div>
  <div class="login-box">
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="consultor@digi.pt" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="loginErr">Email ou password incorretos</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">⚡ DIGI Elite</div>
    <div>
      <span class="topbar-user" id="topbarName"></span>
      <span class="topbar-role" id="topbarRole"></span>
    </div>
    <button class="btn-logout" onclick="doLogout()">Sair</button>
  </div>

  <div class="main" id="mainContent"></div>

  <nav class="nav-bottom" id="navBottom"></nav>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ── CONFIG SUPABASE ──────────────────────────────────────────────
const SB_URL = 'https://lblnhttwadvofhkhkbsv.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxibG5odHR3YWR2b2Zoa2hrYnN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYzNDM4ODUsImV4cCI6MjA4MTkxOTg4NX0.84jsbGQVJCopVWAdc51BnnFCSJQmCEYs9GpwbFB8n3I';

async function sb(table, method='GET', body=null, filters='') {
  const url = `${SB_URL}/rest/v1/${table}${filters}`;
  const opts = {
    method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method==='POST' ? 'return=representation' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) { const e=await r.text(); throw new Error(e); }
  return method==='DELETE' ? null : r.json();
}

// ── STATE ────────────────────────────────────────────────────────
let currentUser = null;
let currentPage = '';
let clockInterval = null;

// ── PATAMARES ───────────────────────────────────────────────────
function getPatamar(nValid) {
  if (nValid <= 5)  return {label:'até 5',  fibra:6,  tv:6, movel:2,   fixo:1};
  if (nValid <= 10) return {label:'6-10',   fibra:8,  tv:6, movel:2,   fixo:1};
  if (nValid <= 15) return {label:'11-15',  fibra:10, tv:6, movel:2,   fixo:1};
  if (nValid <= 20) return {label:'16-20',  fibra:15, tv:6, movel:2,   fixo:1};
  if (nValid <= 50) return {label:'21-50',  fibra:20, tv:6, movel:2,   fixo:1};
  if (nValid <= 75) return {label:'51-75',  fibra:20, tv:6, movel:2.5, fixo:1};
  return              {label:'+75',         fibra:20, tv:6, movel:3,   fixo:1};
}

function calcComissao(qtd, pat) {
  const fibra = 1;
  const tv    = qtd >= 2 ? 1 : 0;
  const movel = Math.max(0, qtd - 2);
  return fibra * pat.fibra + tv * pat.tv + movel * pat.movel;
}

function servicosStr(qtd) {
  if (qtd === 1) return 'Fibra';
  if (qtd === 2) return 'Fibra+TV';
  const m = qtd - 2;
  return `Fibra+TV+${m} Móvel${m>1?'is':''}`;
}

// ── AUTH ─────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value.trim();
  if (!email || !pass) return;
  try {
    const users = await sb('digi_users', 'GET', null, `?email=eq.${encodeURIComponent(email)}&password_hash=eq.${encodeURIComponent(pass)}&ativo=eq.true`);
    if (!users.length) { document.getElementById('loginErr').style.display='block'; return; }
    currentUser = users[0];
    document.getElementById('loginErr').style.display='none';
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('app').style.flexDirection='column';
    document.getElementById('topbarName').textContent = currentUser.nome.split(' ')[0];
    document.getElementById('topbarRole').textContent = currentUser.role === 'admin' ? 'Admin' : 'Consultor';
    buildNav();
    goPage(currentUser.role === 'admin' ? 'adminDash' : 'dash');
  } catch(e) { document.getElementById('loginErr').style.display='block'; }
}

function doLogout() {
  currentUser = null;
  if (clockInterval) clearInterval(clockInterval);
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginEmail').value='';
  document.getElementById('loginPass').value='';
}

// ── NAV ──────────────────────────────────────────────────────────
const consultorNav = [
  {id:'dash',     icon:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',  label:'Início'},
  {id:'presenca', icon:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',                                    label:'Presença'},
  {id:'porta',    icon:'<path d="M3 9v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9"/><rect x="1" y="3" width="22" height="6" rx="1"/>',    label:'Porta'},
  {id:'chamadas', icon:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12 19.79 19.79 0 0 1 1.08 3.4 2 2 0 0 1 3.05 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>', label:'Chamadas'},
  {id:'autos',    icon:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>',label:'Autos'},
];

const adminNav = [
  {id:'adminDash',     icon:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',label:'Dashboard'},
  {id:'adminAutos',    icon:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',label:'Autos'},
  {id:'adminRels',     icon:'<path d="M3 9v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9"/><rect x="1" y="3" width="22" height="6" rx="1"/>',label:'Relatórios'},
  {id:'adminPresenca', icon:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',label:'Presenças'},
  {id:'adminUsers',    icon:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',label:'Equipa'},
];

function buildNav() {
  const nav = currentUser.role === 'admin' ? adminNav : consultorNav;
  document.getElementById('navBottom').innerHTML = nav.map(n => `
    <button class="nav-btn" id="nav-${n.id}" onclick="goPage('${n.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${n.icon}</svg>
      ${n.label}
    </button>
  `).join('');

function goPage(id) {
  currentPage = id;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById(`nav-${id}`);
  if (nb) nb.classList.add('active');
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `<div class="loading"><div class="spinner"></div><br>A carregar...</div>`;
  pages[id]();
}

// ── TOAST ────────────────────────────────────────────────────────
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err?' err':'') + ' show';
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── MODAL ────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
document.addEventListener('click', e => {
  if (e.target.id === 'modalOverlay') closeModal();
});

// ── UTILS ────────────────────────────────────────────────────────
function today() { return new Date().toISOString().slice(0,10); }
function now() { return new Date().toTimeString().slice(0,5); }
function fmtDate(d) { if(!d)return'—'; const p=d.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; }
function statusBadge(s) {
  const cls = {Validado:'validado',Novo:'novo',Incompleto:'incompleto',Cancelado:'cancelado'}[s]||'outro';
  return `<span class="badge badge-${cls}">${s}</span>`;
}

                <td>${fmtDate(a.data_pedido)}</td>
                <td style="color:var(--green);font-size:10px">${(userMap[a.user_id]||'—').split(' ')[0]}</td>
                <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis">${a.nome_cliente||'—'}</td>
                <td>${a.ref_pedido||'—'}</td>
                <td style="text-align:center">${a.qtd}</td>
                <td>${statusBadge(a.status)}</td>
                <td><button class="btn btn-secondary btn-sm" onclick="openEditAuto('${a.id}','${a.status}')">✏️</button></td>

            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch(e) { mc.innerHTML=`<div class="empty">Erro: ${e.message}</div>`; }
};

async function submitNewAuto() {
  try {
    const uid = document.getElementById('m_user').value;
    const qtd = parseInt(document.getElementById('m_qtd').value)||1;
    // calc patamar
    const userAutos = await sb('digi_autos','GET',null,`?user_id=eq.${uid}&status=eq.Validado`);
    const pat = getPatamar(userAutos.length);
    await sb('digi_autos','POST',{
      user_id:uid,
      ref_pedido:document.getElementById('m_ref').value,
      nome_cliente:document.getElementById('m_nome').value,
      qtd, data_pedido:document.getElementById('m_data').value,
      status:document.getElementById('m_status').value,
      servicos:servicosStr(qtd),
      comissao_valor:calcComissao(qtd,pat),
      patamar:pat.label
    });
    closeModal(); toast('✅ Auto adicionado!'); pages.adminAutos();
  } catch(e) { toast('Erro: '+e.message,true); }
}

function openEditAuto(id, currentStatus) {
  openModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title">Alterar Status</div>
    <div class="form-group"><label class="form-label">Novo Status</label>
      <select class="form-select" id="e_status">
        ${['Novo','Validado','Incompleto','Cancelado'].map(s=>`<option${s===currentStatus?' selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <button class="btn btn-primary btn-full" onclick="updateAutoStatus('${id}')">💾 Atualizar</button>
    <br><br>
    <button class="btn btn-danger btn-full btn-sm" onclick="deleteAuto('${id}')">🗑 Eliminar</button>
  `);
}

async function updateAutoStatus(id) {
  try {
    await sb(`digi_autos?id=eq.${id}`,'PATCH',{status:document.getElementById('e_status').value});
    closeModal(); toast('✅ Status atualizado!'); pages.adminAutos();
  } catch(e) { toast('Erro: '+e.message,true); }
}

async function deleteAuto(id) {
  if (!confirm('Eliminar este auto?')) return;
  try {
    await sb(`digi_autos?id=eq.${id}`,'DELETE');
    closeModal(); toast('🗑 Auto eliminado!'); pages.adminAutos();
  } catch(e) { toast('Erro: '+e.message,true); }
}

// ADMIN RELATÓRIOS
pages.adminRels = async function() {
  const mc = document.getElementById('mainContent');
  try {
    const [porta, chams, users] = await Promise.all([
      sb('digi_relatorio_porta','GET',null,`?order=data.desc&limit=30`),
      sb('digi_relatorio_chamadas','GET',null,`?order=data.desc&limit=30`),
      sb('digi_users','GET',null,`?ativo=eq.true`)
    ]);
    const userMap = Object.fromEntries(users.map(u=>[u.id,u.nome]));
    let tab = 'porta';

    function renderTab() {
      const lista = tab==='porta' ? porta : chams;
      document.getElementById('relContent').innerHTML = lista.length ? `
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Data</th><th>Consultor</th>
              ${tab==='porta' ? '<th>Rua</th><th>Portas</th><th>Contactos</th><th>Marc.</th>' : '<th>Total</th><th>Atend.</th><th>Interes.</th><th>Marc.</th>'}
            </tr></thead>
            <tbody>
              ${lista.map(r=>`<tr>
                <td>${fmtDate(r.data)}</td>
                <td style="color:var(--green);font-size:10px">${(userMap[r.user_id]||'—').split(' ')[0]}</td>
                ${tab==='porta' ? `<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis">${r.rua||'—'}</td><td>${r.numero_portas}</td><td>${r.contactos}</td><td style="color:var(--green);font-weight:700">${r.marcacoes}</td>` : `<td>${r.total_chamadas}</td><td>${r.atendidas}</td><td>${r.interessados}</td><td style="color:var(--green);font-weight:700">${r.marcacoes}</td>`}
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      ` : '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Sem relatórios</div></div>';
      document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.t===tab));
    }

    mc.innerHTML = `
      <div class="sec-title">Relatórios da Equipa</div>
      <div class="tabs">
        <div class="tab active" data-t="porta" onclick="window._relTab('porta')">🚪 Porta a Porta</div>
        <div class="tab" data-t="chams" onclick="window._relTab('chams')">📞 Chamadas</div>
      </div>
      <div id="relContent"></div>
    `;
    window._relTab = (t) => { tab=t; renderTab(); };
    renderTab();
  } catch(e) { mc.innerHTML=`<div class="empty">Erro: ${e.message}</div>`; }
};

function showCertModal(top3) {
  const medals = ['🥇','🥈','🥉'];
  const titles = ['Melhor Consultor','2º Melhor Consultor','3º Melhor Consultor'];
  const mes = new Date().toLocaleDateString('pt-PT',{month:'long',year:'numeric'});
  openModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title">🎖 Certificados — ${mes}</div>
    ${top3.map((r,i)=>`
      <div class="cert-preview" style="margin-bottom:12px">
        <div class="cert-pos">${medals[i]}</div>
        <div class="cert-title">${titles[i]}</div>
        <div class="cert-sub">DIGI Portugal · ${mes}</div>
        <div class="cert-name">${r.nome}</div>
        <div class="cert-detail">${r.n_val} contratos validados · ${r.real.toFixed(0)}€ em comissões</div>
      </div>
      <button class="btn btn-secondary btn-full" style="margin-bottom:12px" onclick="gerarPDF(${JSON.stringify(r).replace(/"/g,'&quot;')},${i})">⬇️ Descarregar Certificado ${i+1}º</button>
    `).join('')}
  `);
}

function gerarPDF(r, pos) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a5' });
  const mes = new Date().toLocaleDateString('pt-PT',{month:'long',year:'numeric'});
  const medals = ['🥇 1º LUGAR','🥈 2º LUGAR','🥉 3º LUGAR'];
  const titles = ['MELHOR CONSULTOR','2º MELHOR CONSULTOR','3º MELHOR CONSULTOR'];

  // Background
  doc.setFillColor(7,7,11);
  doc.rect(0,0,210,148,'F');

  // Border
  doc.setDrawColor(160,255,184);
  doc.setLineWidth(1.5);
  doc.rect(6,6,198,136);

  // Inner border
  doc.setLineWidth(0.3);
  doc.rect(9,9,192,130);

  // Header
  doc.setFillColor(13,13,20);
  doc.rect(6,6,198,30,'F');

  doc.setTextColor(160,255,184);
  doc.setFontSize(22);
  doc.setFont('helvetica','bold');
  doc.text('⚡ DIGI ELITE HUB', 105, 20, {align:'center'});
  doc.setFontSize(9);
  doc.setTextColor(90,90,122);
  doc.setFont('helvetica','normal');
  doc.text('CERTIFICADO DE RECONHECIMENTO', 105, 28, {align:'center'});

  // Medal
  doc.setFontSize(36);
  doc.setTextColor(255,215,0);
  doc.text(pos===0?'🥇':pos===1?'🥈':'🥉', 105, 62, {align:'center'});

  // Position
  doc.setFontSize(14);
  doc.setTextColor(160,255,184);
  doc.setFont('helvetica','bold');
  doc.text(medals[pos], 105, 75, {align:'center'});

  // Title
  doc.setFontSize(11);
  doc.setTextColor(90,90,122);
  doc.setFont('helvetica','normal');
  doc.text(titles[pos], 105, 83, {align:'center'});

  // Name
  doc.setFontSize(20);
  doc.setTextColor(232,232,240);
  doc.setFont('helvetica','bold');
  doc.text(r.nome.toUpperCase(), 105, 97, {align:'center'});

  // Stats
  doc.setFontSize(10);
  doc.setTextColor(160,255,184);
  doc.setFont('helvetica','normal');
  doc.text(`${r.n_val} contratos validados  ·  ${r.real.toFixed(0)}€ em comissões`, 105, 107, {align:'center'});

  // Month
  doc.setFontSize(9);
  doc.setTextColor(90,90,122);
  doc.text(mes.toUpperCase(), 105, 116, {align:'center'});

  // Footer line
  doc.setDrawColor(160,255,184);
  doc.setLineWidth(0.5);
  doc.line(30, 122, 180, 122);

  doc.setFontSize(7);
  doc.setTextColor(90,90,122);
  doc.text('DIGI Portugal · REBORN AI · Elite Hub Platform', 105, 128, {align:'center'});

  doc.save(`Certificado_${pos+1}_${r.nome.replace(/ /g,'_')}.pdf`);
  toast('✅ PDF descarregado!');
}
