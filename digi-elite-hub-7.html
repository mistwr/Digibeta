<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DIGI Elite Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');
:root{--bg:#07070b;--s:#0d0d14;--s2:#12121c;--b:#1e1e2e;--g:#a0ffb8;--gd:rgba(160,255,184,0.08);--gm:rgba(160,255,184,0.18);--t:#e8e8f0;--m:#5a5a7a;--r:#ff6b6b;--y:#ffd93d;--bl:#6eb4ff;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:'Space Mono',monospace;font-size:13px;}
#loginScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--g);margin-bottom:4px;}
.logo-sub{font-size:11px;color:var(--m);margin-bottom:40px;letter-spacing:2px;text-transform:uppercase;}
.login-box{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:32px;width:100%;max-width:360px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:10px;color:var(--m);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.field input{width:100%;background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:12px 14px;color:var(--t);font-family:'Space Mono',monospace;font-size:14px;outline:none;}
.field input:focus{border-color:var(--g);}
.btn-login{width:100%;background:var(--g);color:#07070b;border:none;border-radius:8px;padding:14px;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;margin-top:4px;}
#loginMsg{margin-top:12px;font-size:12px;text-align:center;min-height:20px;color:var(--r);}
#app{display:none;min-height:100vh;flex-direction:column;}
.topbar{background:var(--s);border-bottom:1px solid var(--b);padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--g);flex:1;}
.role-badge{font-size:9px;background:var(--gd);color:var(--g);border:1px solid var(--gm);border-radius:20px;padding:2px 8px;letter-spacing:.5px;text-transform:uppercase;}
.btn-out{background:none;border:1px solid var(--b);border-radius:6px;color:var(--m);font-family:'Space Mono',monospace;font-size:10px;padding:4px 10px;cursor:pointer;}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--s);border-top:1px solid var(--b);display:flex;z-index:100;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;background:none;border:none;color:var(--m);font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;gap:3px;letter-spacing:.3px;}
.nb.active{color:var(--g);}
.nb svg{width:20px;height:20px;}
.main{flex:1;padding:16px 16px 80px;max-width:600px;margin:0 auto;width:100%;}
.page{display:none;}.page.active{display:block;}
.sec-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px;}
.sec-sub{font-size:11px;color:var(--m);margin-bottom:20px;}
.card{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:16px;margin-bottom:12px;}
.card-title{font-size:10px;color:var(--m);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.stat{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px;}
.stat-n{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--g);}
.stat-l{font-size:10px;color:var(--m);margin-top:3px;}
.pat-box{background:var(--gd);border:1px solid var(--gm);border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.pat-n{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--g);}
.pat-l{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:1px;}
.pat-val{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--g);}
.pat-rates{display:flex;gap:10px;margin-top:4px;}
.pat-r{font-size:10px;color:var(--m);}
.pat-r span{color:var(--g);font-weight:700;}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--b);}
.row:last-child{border-bottom:none;}
.row-l{font-size:11px;color:var(--m);}
.btn{display:inline-flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:12px;padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-weight:700;letter-spacing:.3px;}
.btn-p{background:var(--g);color:#07070b;}.btn-p:hover{opacity:.85;}
.btn-s{background:var(--s2);color:var(--g);border:1px solid var(--gm);}
.btn-d{background:var(--s2);color:var(--r);border:1px solid rgba(255,107,107,.2);}
.btn-sm{padding:5px 10px;font-size:10px;}
.btn-full{width:100%;justify-content:center;}
.checkin-card{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:24px;text-align:center;margin-bottom:16px;}
.clock{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;color:var(--g);letter-spacing:-2px;}
.clock-date{font-size:11px;color:var(--m);margin-bottom:16px;}
.ci-badge{display:inline-block;font-size:10px;padding:4px 12px;border-radius:20px;margin-bottom:16px;font-weight:700;}
.ci-in{background:rgba(160,255,184,.15);color:var(--g);border:1px solid var(--gm);}
.ci-out{background:rgba(90,90,122,.15);color:var(--m);border:1px solid var(--b);}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:10px;color:var(--m);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.fi,.fsel,.fta{width:100%;background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:11px 14px;color:var(--t);font-family:'Space Mono',monospace;font-size:12px;outline:none;}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--g);}
.fta{resize:vertical;min-height:80px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tw{overflow-x:auto;border:1px solid var(--b);border-radius:10px;margin-bottom:16px;}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:380px;}
thead th{background:var(--s2);padding:9px 10px;text-align:left;font-size:9px;color:var(--g);letter-spacing:.8px;text-transform:uppercase;border-bottom:1px solid var(--b);}
tbody tr{border-bottom:1px solid var(--b);}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:8px 10px;color:var(--t);}
.bv{display:inline-block;font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;}
.bv-v{background:rgba(160,255,184,.15);color:var(--g);}
.bv-n{background:rgba(110,180,255,.15);color:var(--bl);}
.bv-i{background:rgba(255,217,61,.15);color:var(--y);}
.bv-c{background:rgba(255,107,107,.15);color:var(--r);}
.bv-o{background:rgba(90,90,122,.15);color:var(--m);}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.tab{font-family:'Space Mono',monospace;font-size:10px;padding:5px 12px;border-radius:20px;border:1px solid var(--b);background:var(--s);color:var(--m);cursor:pointer;}
.tab.active{border-color:var(--g);color:var(--g);background:var(--gd);}
.rank-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--s);border:1px solid var(--b);border-radius:10px;margin-bottom:8px;}
.rank-pos{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;min-width:36px;text-align:center;}
.gold{color:#ffd700;}.silver{color:#c0c0c0;}.bronze{color:#cd7f32;}
.rank-name{flex:1;font-size:13px;font-weight:700;}
.u-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--s);border:1px solid var(--b);border-radius:10px;margin-bottom:8px;}
.u-av{width:36px;height:36px;background:var(--gd);border:1px solid var(--gm);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--g);}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--s);border:1px solid var(--gm);color:var(--g);padding:10px 20px;border-radius:8px;font-size:12px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.err{border-color:rgba(255,107,107,.3);color:var(--r);}
.toast.show{opacity:1;}
.modal-ov{position:fixed;inset:0;background:rgba(7,7,11,.85);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:var(--s);border:1px solid var(--b);border-radius:16px 16px 0 0;width:100%;max-width:520px;padding:24px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:18px;}
.modal-x{float:right;background:none;border:none;color:var(--m);font-size:22px;cursor:pointer;}
.empty{text-align:center;padding:40px 20px;color:var(--m);font-size:12px;}
.sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="logo">⚡ DIGI Elite Hub</div>
  <div class="logo-sub">Plataforma de Equipa</div>
  <div class="login-box">
    <div class="field"><label>Email</label><input type="email" id="lEmail" placeholder="admin@digi.pt"></div>
    <div class="field"><label>Password</label><input type="password" id="lPass" placeholder="••••••••"></div>
    <button class="btn-login" id="lBtn" onclick="doLogin()">Entrar</button>
    <div id="loginMsg"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-logo">⚡ DIGI Elite</div>
    <span id="tName" style="font-size:11px;color:var(--m)"></span>
    <span class="role-badge" id="tRole"></span>
    <button class="btn-out" onclick="doLogout()">Sair</button>
  </div>
  <div class="main" id="mainContent"></div>
  <nav class="nav" id="navBar"></nav>
</div>

<div class="toast" id="toast"></div>
<div class="modal-ov" id="modalOv"><div class="modal" id="modalContent"></div></div>

<script>
const SB = 'https://lblnhttwadvofhkhkbsv.supabase.co';
const SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxibG5odHR3YWR2b2Zoa2hrYnN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYzNDM4ODUsImV4cCI6MjA4MTkxOTg4NX0.84jsbGQVJCopVWAdc51BnnFCSJQmCEYs9GpwbFB8n3I';

let CU = null, CLK = null, CP = '';

async function api(table, method, body, qs) {
  qs = qs || '';
  const h = {'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'};
  if (method==='POST'||method==='PATCH') h['Prefer']='return=representation';
  const opts = {method:method||'GET', headers:h};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(SB+'/rest/v1/'+table+qs, opts);
  const txt = await r.text();
  if (!r.ok) throw new Error('HTTP '+r.status+': '+txt.substring(0,100));
  if (!txt || method==='DELETE') return [];
  try { return JSON.parse(txt); } catch(e) { return []; }
}

function getPat(n) {
  if (n<=5)  return {label:'até 5',  f:6,  tv:6, m:2,   fx:1};
  if (n<=10) return {label:'6-10',   f:8,  tv:6, m:2,   fx:1};
  if (n<=15) return {label:'11-15',  f:10, tv:6, m:2,   fx:1};
  if (n<=20) return {label:'16-20',  f:15, tv:6, m:2,   fx:1};
  if (n<=50) return {label:'21-50',  f:20, tv:6, m:2,   fx:1};
  if (n<=75) return {label:'51-75',  f:20, tv:6, m:2.5, fx:1};
  return            {label:'+75',    f:20, tv:6, m:3,   fx:1};
}

function calcCom(qtd, pat) {
  var f=1, tv=qtd>=2?1:0, mv=Math.max(0,qtd-2);
  return f*pat.f + tv*pat.tv + mv*pat.m;
}

function svcs(qtd) {
  if (qtd===1) return 'Fibra';
  if (qtd===2) return 'Fibra+TV';
  return 'Fibra+TV+'+(qtd-2)+'Móvel';
}

function today() { return new Date().toISOString().slice(0,10); }
function nowt()  { return new Date().toTimeString().slice(0,5); }
function fdate(d){ if(!d)return'—'; var p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }

function badge(s) {
  var map = {Validado:'bv-v',Novo:'bv-n',Incompleto:'bv-i',Cancelado:'bv-c'};
  return '<span class="bv '+(map[s]||'bv-o')+'">'+s+'</span>';
}

function toast(msg, err) {
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(err?' err':'')+' show';
  setTimeout(function(){t.classList.remove('show');},2500);
}

function openModal(html) {
  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('modalOv').classList.add('open');
}
function closeModal() { document.getElementById('modalOv').classList.remove('open'); }
document.addEventListener('click', function(e){ if(e.target.id==='modalOv') closeModal(); });

async function doLogin() {
  var email = document.getElementById('lEmail').value.trim().toLowerCase();
  var pass  = document.getElementById('lPass').value;
  var msg   = document.getElementById('loginMsg');
  var btn   = document.getElementById('lBtn');
  msg.textContent = '';
  if (!email||!pass) { msg.textContent='Preenche os campos'; return; }
  btn.textContent='A entrar...'; btn.disabled=true;
  try {
    var users = await api('digi_users','GET',null,'?email=eq.'+encodeURIComponent(email)+'&select=*');
    if (!users.length) { msg.textContent='Email não encontrado'; btn.textContent='Entrar'; btn.disabled=false; return; }
    var u = users[0];
    if (u.password_hash !== pass) { msg.textContent='Password incorreta'; btn.textContent='Entrar'; btn.disabled=false; return; }
    if (!u.ativo) { msg.textContent='Conta desativada'; btn.textContent='Entrar'; btn.disabled=false; return; }
    CU = u;
    document.getElementById('loginScreen').style.display='none';
    var app=document.getElementById('app'); app.style.display='flex'; app.style.flexDirection='column';
    document.getElementById('tName').textContent=CU.nome.split(' ')[0];
    document.getElementById('tRole').textContent=CU.role==='admin'?'Admin':'Consultor';
    buildNav();
    goPage(CU.role==='admin'?'aDash':'dash');
  } catch(e) {
    msg.textContent='Erro: '+e.message;
    btn.textContent='Entrar'; btn.disabled=false;
  }
}

function doLogout() {
  CU=null; if(CLK)clearInterval(CLK);
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
}

var cNav=[
  {id:'dash',     svg:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',label:'Início'},
  {id:'presenca', svg:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',label:'Presença'},
  {id:'porta',    svg:'<path d="M3 9v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9"/><rect x="1" y="3" width="22" height="6" rx="1"/>',label:'Porta'},
  {id:'chamadas', svg:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12 19.79 19.79 0 0 1 1.08 3.4 2 2 0 0 1 3.05 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>',label:'Chamadas'},
  {id:'autos',    svg:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',label:'Autos'},
];
var aNav=[
  {id:'aDash',    svg:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',label:'Dashboard'},
  {id:'aAutos',   svg:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',label:'Autos'},
  {id:'aRels',    svg:'<path d="M3 9v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9"/><rect x="1" y="3" width="22" height="6" rx="1"/>',label:'Relatórios'},
  {id:'aPres',    svg:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',label:'Presenças'},
  {id:'aUsers',   svg:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>',label:'Equipa'},
];

function buildNav() {
  var nav = CU.role==='admin' ? aNav : cNav;
  document.getElementById('navBar').innerHTML = nav.map(function(n){
    return '<button class="nb" id="nb-'+n.id+'" onclick="goPage(\''+n.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+n.svg+'</svg>'+n.label+'</button>';
  }).join('');
}

function goPage(id) {
  CP=id;
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('active');});
  var nb=document.getElementById('nb-'+id); if(nb) nb.classList.add('active');
  document.getElementById('mainContent').innerHTML='<div class="empty">A carregar...</div>';
  if(pages[id]) pages[id]();
}

var pages = {};

// ── DASH CONSULTOR
pages.dash = async function() {
  var mc=document.getElementById('mainContent');
  try {
    var autos = await api('digi_autos','GET',null,'?user_id=eq.'+CU.id+'&order=data_pedido.desc');
    var pres  = await api('digi_presenca','GET',null,'?user_id=eq.'+CU.id+'&data=eq.'+today()+'&limit=1');
    var porta = await api('digi_relatorio_porta','GET',null,'?user_id=eq.'+CU.id+'&data=eq.'+today()+'&limit=1');
    var chams = await api('digi_relatorio_chamadas','GET',null,'?user_id=eq.'+CU.id+'&data=eq.'+today()+'&limit=1');
    var val=autos.filter(function(a){return a.status==='Validado';});
    var nov=autos.filter(function(a){return a.status==='Novo';});
    var can=autos.filter(function(a){return a.status==='Cancelado';});
    var inc=autos.filter(function(a){return a.status==='Incompleto';});
    var pat=getPat(val.length);
    var real=val.reduce(function(s,a){return s+calcCom(a.qtd,pat);},0);
    var proj=real+nov.reduce(function(s,a){return s+calcCom(a.qtd,getPat(val.length+nov.length));},0);
    var sub=[].concat(can,inc).reduce(function(s,a){return s+calcCom(a.qtd,pat);},0);
    var p=pres[0], po=porta[0], ch=chams[0];
    mc.innerHTML='<div class="sec-title">Olá, '+CU.nome.split(' ')[0]+' 👋</div>'
      +'<div class="sec-sub">'+new Date().toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'})+'</div>'
      +'<div class="pat-box"><div><div class="pat-l">Patamar atual</div><div class="pat-val">'+pat.label+' validados</div>'
      +'<div class="pat-rates"><div class="pat-r">Fibra <span>'+pat.f+'€</span></div><div class="pat-r">TV <span>'+pat.tv+'€</span></div><div class="pat-r">Móvel <span>'+pat.m+'€</span></div></div></div>'
      +'<div style="text-align:right"><div class="pat-n">'+val.length+'</div><div style="font-size:10px;color:var(--m)">validados</div></div></div>'
      +'<div class="grid2">'
      +'<div class="stat"><div class="stat-n">'+real.toFixed(1)+'€</div><div class="stat-l">💶 Real</div></div>'
      +'<div class="stat"><div class="stat-n" style="color:var(--bl)">'+proj.toFixed(1)+'€</div><div class="stat-l">🔮 Projeção</div></div>'
      +'<div class="stat"><div class="stat-n" style="color:var(--r)">'+sub.toFixed(1)+'€</div><div class="stat-l">➖ Subtrair</div></div>'
      +'<div class="stat"><div class="stat-n" style="color:'+(real-sub>=0?'var(--g)':'var(--r)')+'">'+(real-sub).toFixed(1)+'€</div><div class="stat-l">💰 Líquido</div></div>'
      +'</div>'

      +'<div class="tw"><table><thead><tr><th>Data</th><th>Consultor</th><th>Entrada</th><th>Saída</th><th>Local</th></tr></thead><tbody>'
      +pres.map(function(p){return '<tr><td>'+fdate(p.data)+'</td><td style="color:var(--g);font-size:10px">'+((um[p.user_id]||'—').split(' ')[0])+'</td><td>'+(p.hora_entrada||'—')+'</td><td>'+(p.hora_saida||'—')+'</td><td style="color:var(--m);font-size:10px">'+(p.localidade||'—')+'</td></tr>';}).join('')
      +'</tbody></table></div>';
  } catch(e){mc.innerHTML='<div class="empty">Erro: '+e.message+'</div>';}
};

// ── ADMIN USERS
pages.aUsers = async function() {
  var mc=document.getElementById('mainContent');
  try {
    var users=await api('digi_users','GET',null,'?order=created_at.asc');
    mc.innerHTML='<div class="sec-row"><div><div class="sec-title">Equipa</div><div class="sec-sub">'+users.filter(function(u){return u.role==='consultor';}).length+' consultores</div></div>'
      +'<button class="btn btn-p btn-sm" onclick="openNewUser()">+ Novo</button></div>'
      +users.filter(function(u){return u.role==='consultor';}).map(function(u){
        return '<div class="u-item"><div class="u-av">'+u.nome[0]+'</div><div style="flex:1"><div style="font-size:13px;font-weight:700">'+u.nome+'</div><div style="font-size:10px;color:var(--m)">'+u.email+'</div></div>'
          +'<span class="bv '+(u.ativo?'bv-v':'bv-c')+'" style="margin-right:8px">'+(u.ativo?'Ativo':'Inativo')+'</span>'
          +'<button class="btn btn-s btn-sm" onclick="toggleUser(\''+u.id+'\','+u.ativo+')">⚙️</button></div>';
      }).join('');
  } catch(e){mc.innerHTML='<div class="empty">Erro: '+e.message+'</div>';}
};

window.openNewUser=function(){
  openModal('<button class="modal-x" onclick="closeModal()">×</button><div class="modal-title">Novo Consultor</div>'
    +'<div class="fg"><label class="fl">Nome completo</label><input class="fi" id="u_nom" placeholder="João Silva"></div>'
    +'<div class="fg"><label class="fl">Email</label><input class="fi" id="u_eml" type="email" placeholder="joao@digi.pt"></div>'
    +'<div class="fg"><label class="fl">Password</label><input class="fi" id="u_pas" placeholder="password inicial"></div>'
    +'<button class="btn btn-p btn-full" onclick="submitNewUser()">💾 Criar</button>');
};
window.submitNewUser=async function(){
  try{await api('digi_users','POST',{nome:document.getElementById('u_nom').value,email:document.getElementById('u_eml').value,password_hash:document.getElementById('u_pas').value,role:'consultor',ativo:true});closeModal();toast('✅ Consultor criado!');pages.aUsers();}catch(e){toast('Erro: '+e.message,true);}
};
window.toggleUser=async function(id,cur){
  try{await api('digi_users?id=eq.'+id,'PATCH',{ativo:!cur});toast(cur?'⚪ Desativado':'✅ Ativado');pages.aUsers();}catch(e){toast('Erro: '+e.message,true);}
};

// ── CERTIFICADOS
window.showCerts=function(top3) {
  var mes=new Date().toLocaleDateString('pt-PT',{month:'long',year:'numeric'});
  var medals=['🥇','🥈','🥉'],titles=['1º Melhor Consultor','2º Melhor Consultor','3º Melhor Consultor'];
  openModal('<button class="modal-x" onclick="closeModal()">×</button><div class="modal-title">🎖 Certificados — '+mes+'</div>'
    +top3.map(function(r,i){
      return '<div style="background:linear-gradient(135deg,#07070b,#0d1a0d);border:1px solid var(--g);border-radius:10px;padding:20px;text-align:center;margin-bottom:12px">'
        +'<div style="font-size:36px">'+medals[i]+'</div>'
        +'<div style="font-family:Syne,sans-serif;font-size:14px;font-weight:700;color:var(--g)">'+titles[i]+'</div>'
        +'<div style="font-size:10px;color:var(--m);margin-bottom:8px">DIGI Portugal · '+mes+'</div>'
        +'<div style="font-family:Syne,sans-serif;font-size:17px;font-weight:700">'+r.nome+'</div>'
        +'<div style="font-size:11px;color:var(--g);margin-top:4px">'+r.nv+' validados · '+r.real.toFixed(0)+'€</div>'
        +'</div>'
        +'<button class="btn btn-s btn-full" style="margin-bottom:12px" onclick="gerarPDF(\''+r.nome+'\','+r.nv+','+r.real.toFixed(0)+','+i+')">⬇️ PDF '+titles[i]+'</button>';
    }).join(''));
};

window.gerarPDF=function(nome,nv,real,pos){
  try {
    var jsPDF=window.jspdf.jsPDF;
    var doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a5'});
    var mes=new Date().toLocaleDateString('pt-PT',{month:'long',year:'numeric'});
    var medals=['🥇 1º LUGAR','🥈 2º LUGAR','🥉 3º LUGAR'];
    doc.setFillColor(7,7,11);doc.rect(0,0,210,148,'F');
    doc.setDrawColor(160,255,184);doc.setLineWidth(1.5);doc.rect(6,6,198,136);
    doc.setFillColor(13,13,20);doc.rect(6,6,198,28,'F');
    doc.setTextColor(160,255,184);doc.setFontSize(20);doc.setFont('helvetica','bold');
    doc.text('DIGI ELITE HUB', 105, 18, {align:'center'});
    doc.setFontSize(8);doc.setTextColor(90,90,122);doc.setFont('helvetica','normal');
    doc.text('CERTIFICADO DE RECONHECIMENTO', 105, 26, {align:'center'});
    doc.setFontSize(12);doc.setTextColor(160,255,184);doc.setFont('helvetica','bold');
    doc.text(medals[pos], 105, 52, {align:'center'});
    doc.setFontSize(18);doc.setTextColor(232,232,240);
    doc.text(nome.toUpperCase(), 105, 75, {align:'center'});
    doc.setFontSize(10);doc.setTextColor(160,255,184);doc.setFont('helvetica','normal');
    doc.text(nv+' contratos validados  ·  '+real+'€ em comissões', 105, 88, {align:'center'});
    doc.setFontSize(9);doc.setTextColor(90,90,122);
    doc.text(mes.toUpperCase(), 105, 98, {align:'center'});
    doc.setDrawColor(160,255,184);doc.setLineWidth(0.3);doc.line(30,108,180,108);
    doc.setFontSize(7);doc.text('DIGI Portugal  ·  REBORN AI  ·  Elite Hub', 105, 115, {align:'center'});
    doc.save('Certificado_'+(pos+1)+'_'+nome.replace(/ /g,'_')+'.pdf');
    toast('✅ PDF gerado!');
  } catch(e){toast('Erro PDF: '+e.message,true);}
};

document.getElementById('lPass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('lEmail').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('lPass').focus();});
</script>
