<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
:root{
  --blue:#0066FF;--blue2:#0052CC;--blue3:#3385FF;--blue-light:#E8F0FF;--blue-ultra:#F0F4FF;
  --bg:#F5F5F7;--white:#FFFFFF;--border:#E5E5EA;--border2:#D1D1D6;
  --text:#1C1C1E;--text2:#3C3C43;--muted:#8E8E93;--muted2:#AEAEB2;
  --green:#34C759;--red:#FF3B30;--orange:#FF9500;--yellow:#FFCC00;--purple:#AF52DE;
  --shadow:0 2px 16px rgba(0,0,0,.08);--radius:16px;--radius2:12px;--radius3:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Inter,sans-serif;font-size:13px;-webkit-tap-highlight-color:transparent;}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,rgba(160,255,184,0.05) 0%,transparent 60%);}
.logo{font-family:Inter,sans-serif;font-weight:800;font-size:32px;font-weight:800;color:var(--blue);margin-bottom:4px;letter-spacing:-1px;}
.logo-sub{font-size:10px;color:var(--muted);margin-bottom:48px;letter-spacing:3px;text-transform:uppercase;}
.login-box{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.5);}
.fl{display:block;font-size:10px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px;}
.fi{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--text);font-family:Inter,sans-serif;font-size:14px;outline:none;transition:border .2s;margin-bottom:14px;}
.fi:focus{border-color:var(--blue);}
.btn-login{width:100%;background:var(--blue);color:var(--bg);border:none;border-radius:10px;padding:15px;font-family:Inter,sans-serif;font-weight:800;font-weight:800;font-size:15px;cursor:pointer;margin-top:6px;letter-spacing:.5px;transition:opacity .2s;}
.btn-login:hover{opacity:.85;}
#loginMsg{margin-top:14px;font-size:12px;text-align:center;color:var(--red);min-height:18px;}

/* APP SHELL */
#app{display:none;min-height:100vh;flex-direction:column;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.topbar-logo{font-family:Inter,sans-serif;font-weight:800;font-weight:800;font-size:16px;color:var(--blue);flex:1;letter-spacing:-.5px;}
.role-badge{font-size:9px;background:var(--blue-ultra);color:var(--blue);border:1px solid var(--blue-light);border-radius:20px;padding:3px 10px;letter-spacing:.8px;text-transform:uppercase;}
.btn-out{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:Inter,sans-serif;font-size:10px;padding:5px 12px;cursor:pointer;transition:all .15s;}
.btn-out:hover{color:var(--red);border-color:var(--red);}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;background:none;border:none;color:var(--muted);font-family:Inter,sans-serif;font-size:8px;cursor:pointer;gap:4px;letter-spacing:.3px;transition:color .15s;position:relative;}
.nb svg{width:22px;height:22px;transition:all .15s;}
.nb.active{color:var(--blue);}
.nb.active svg{filter:drop-shadow(0 0 6px rgba(160,255,184,.4));}
.nb.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--blue);border-radius:2px;}

/* MAIN */
.main{flex:1;padding:16px 16px 84px;max-width:600px;margin:0 auto;width:100%;}
.page{display:none;}.page.active{display:block;}

/* TYPOGRAPHY */
.sec-title{font-family:Inter,sans-serif;font-weight:800;font-size:20px;font-weight:700;margin-bottom:3px;}
.sec-sub{font-size:11px;color:var(--muted);margin-bottom:20px;}
.sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;transition:border .2s;}
.card-title{font-size:10px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* STATS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.stat{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 12px;}
.stat-n{font-family:Inter,sans-serif;font-weight:800;font-size:22px;font-weight:800;color:var(--blue);line-height:1;}
.stat-l{font-size:10px;color:var(--muted);margin-top:4px;}

/* PATAMAR */
.pat-box{background:linear-gradient(135deg,rgba(160,255,184,0.06),rgba(160,255,184,0.02));border:1px solid var(--blue-light);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.pat-n{font-family:Inter,sans-serif;font-weight:800;font-size:36px;font-weight:800;color:var(--blue);line-height:1;}
.pat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:2px;}
.pat-val{font-family:Inter,sans-serif;font-weight:800;font-size:14px;font-weight:700;color:var(--blue);}
.pat-rates{display:flex;gap:10px;margin-top:6px;}
.pat-r{font-size:10px;color:var(--muted);}
.pat-r span{color:var(--blue);font-weight:700;}

/* ROWS */
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.row:last-child{border-bottom:none;}
.row-l{font-size:11px;color:var(--muted);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;font-family:Inter,sans-serif;font-size:12px;padding:11px 20px;border-radius:10px;border:none;cursor:pointer;font-weight:700;letter-spacing:.3px;transition:all .15s;}
.btn-p{background:var(--blue);color:var(--bg);}.btn-p:hover{opacity:.85;}
.btn-s{background:var(--bg);color:var(--blue);border:1px solid var(--blue-light);}.btn-s:hover{background:var(--blue-ultra);}
.btn-d{background:var(--bg);color:var(--red);border:1px solid rgba(255,107,107,.2);}
.btn-y{background:rgba(255,217,61,.1);color:var(--yellow);border:1px solid rgba(255,217,61,.2);}
.btn-sm{padding:6px 12px;font-size:10px;border-radius:8px;}
.btn-full{width:100%;justify-content:center;}

/* CHECKIN */
.checkin-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:28px 20px;text-align:center;margin-bottom:14px;}
.clock{font-family:Inter,sans-serif;font-weight:800;font-size:48px;font-weight:800;color:var(--blue);letter-spacing:-3px;line-height:1;}
.clock-date{font-size:11px;color:var(--muted);margin:6px 0 16px;}
.ci-badge{display:inline-block;font-size:10px;padding:5px 14px;border-radius:20px;margin-bottom:18px;font-weight:700;letter-spacing:.5px;}
.ci-in{background:rgba(160,255,184,.12);color:var(--blue);border:1px solid var(--blue-light);}
.ci-out{background:rgba(90,90,122,.12);color:var(--muted);border:1px solid var(--border);}

/* FORMS */
.fg{margin-bottom:14px;}
.fsel,.fta{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:Inter,sans-serif;font-size:12px;outline:none;transition:border .2s;}
.fsel:focus,.fta:focus,.fi:focus{border-color:var(--blue);}
.fta{resize:vertical;min-height:80px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* TABLE */
.tw{overflow-x:auto;border:1px solid var(--border);border-radius:12px;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:360px;}
thead th{background:var(--bg);padding:10px 12px;text-align:left;font-size:9px;color:var(--blue);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover{background:rgba(255,255,255,.02);}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:9px 12px;color:var(--text);white-space:nowrap;}

/* BADGES */
.bv{display:inline-block;font-size:9px;padding:3px 8px;border-radius:20px;font-weight:700;letter-spacing:.3px;}
.bv-v{background:rgba(160,255,184,.12);color:var(--blue);}
.bv-n{background:rgba(110,180,255,.12);color:var(--blue3);}
.bv-i{background:rgba(255,217,61,.12);color:var(--yellow);}
.bv-c{background:rgba(255,107,107,.12);color:var(--red);}
.bv-o{background:rgba(90,90,122,.12);color:var(--muted);}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.tab{font-family:Inter,sans-serif;font-size:10px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;transition:all .15s;letter-spacing:.3px;}
.tab.active,.tab:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-ultra);}

/* RANKING */
.rank-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--white);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;transition:border .15s;}
.rank-item:hover{border-color:var(--blue-light);}
.rank-pos{font-family:Inter,sans-serif;font-weight:800;font-size:24px;font-weight:800;min-width:38px;text-align:center;}
.gold{color:#ffd700;text-shadow:0 0 12px rgba(255,215,0,.3);}
.silver{color:#c0c0c0;}
.bronze{color:#cd7f32;}

/* USERS */
.u-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--white);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;}
.u-av{width:40px;height:40px;background:var(--blue-ultra);border:1px solid var(--blue-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Inter,sans-serif;font-weight:800;font-weight:800;font-size:15px;color:var(--blue);}

/* PDF UPLOAD ZONE */
.upload-zone{border:2px dashed var(--border);border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:var(--white);}
.upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:var(--blue-ultra);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:40px;margin-bottom:10px;}
.upload-zone h3{font-family:Inter,sans-serif;font-weight:800;font-size:16px;color:var(--blue);margin-bottom:4px;}
.upload-zone p{font-size:11px;color:var(--muted);}

/* CONTRACT CARD */
.contract-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;position:relative;}
.contract-card.extracting{border-color:var(--blue-light);animation:pulse 1.5s infinite;}
.contract-card.done{border-color:rgba(160,255,184,.3);}
.contract-card.err{border-color:rgba(255,107,107,.3);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.contract-field{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;}
.contract-field:last-child{border-bottom:none;}
.cf-label{color:var(--muted);min-width:100px;font-size:10px;letter-spacing:.5px;text-transform:uppercase;}
.cf-val{color:var(--text);text-align:right;font-size:11px;max-width:180px;word-break:break-word;}

/* TOAST */
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:var(--white);border:1px solid var(--blue-light);color:var(--blue);padding:10px 22px;border-radius:10px;font-size:12px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.toast.err{border-color:rgba(255,107,107,.3);color:var(--red);}
.toast.show{opacity:1;}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(7,7,11,.88);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:var(--white);border:1px solid var(--border);border-top-left-radius:20px;border-top-right-radius:20px;width:100%;max-width:540px;padding:24px;padding-bottom:calc(24px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;}
.modal-title{font-family:Inter,sans-serif;font-weight:800;font-size:17px;font-weight:700;margin-bottom:20px;}
.modal-x{float:right;background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;margin-top:-4px;}

.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:36px;margin-bottom:8px;}
.empty-text{font-size:12px;}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}

.progress-bar{background:var(--border);border-radius:4px;height:4px;overflow:hidden;margin:10px 0;}
.progress-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .3s;}

.finance-big{font-family:Inter,sans-serif;font-weight:800;font-size:28px;font-weight:800;}
</style>

<script>
const SB='https://lblnhttwadvofhkhkbsv.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxibG5odHR3YWR2b2Zoa2hrYnN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYzNDM4ODUsImV4cCI6MjA4MTkxOTg4NX0.84jsbGQVJCopVWAdc51BnnFCSJQmCEYs9GpwbFB8n3I';
const AK=''; // Anthropic API key not needed - using proxy

let CU=null,CLK=null,CP='',CONTRACTS=[];

async function api(table,method,body,qs){
  qs=qs||'';
  const h={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'};
  if(method==='POST'||method==='PATCH')h['Prefer']='return=representation';
  const opts={method:method||'GET',headers:h};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(SB+'/rest/v1/'+table+qs,opts);
  const txt=await r.text();
  if(!r.ok)throw new Error('HTTP '+r.status+': '+txt.substring(0,120));
  if(!txt||method==='DELETE')return[];
  try{return JSON.parse(txt);}catch(e){return[];}
}

function getPat(n){
  if(n<=5)  return{label:'até 5',  f:6, tv:6,m:2,  fx:1};
  if(n<=10) return{label:'6-10',   f:8, tv:6,m:2,  fx:1};
  if(n<=15) return{label:'11-15',  f:10,tv:6,m:2,  fx:1};
  if(n<=20) return{label:'16-20',  f:15,tv:6,m:2,  fx:1};
  if(n<=50) return{label:'21-50',  f:20,tv:6,m:2,  fx:1};
  if(n<=75) return{label:'51-75',  f:20,tv:6,m:2.5,fx:1};
  return         {label:'+75',     f:20,tv:6,m:3,  fx:1};
}
function calcCom(qtd,pat){var f=1,tv=qtd>=2?1:0,mv=Math.max(0,qtd-2);return f*pat.f+tv*pat.tv+mv*pat.m;}
function svcs(qtd){if(qtd===1)return'Fibra';if(qtd===2)return'Fibra+TV';return'Fibra+TV+'+(qtd-2)+'Móvel';}
function today(){return new Date().toISOString().slice(0,10);}
function nowt(){return new Date().toTimeString().slice(0,5);}
function fdate(d){if(!d)return'—';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function badge(s){var m={Validado:'bv-v',Novo:'bv-n',Incompleto:'bv-i',Cancelado:'bv-c'};return'<span class="bv '+(m[s]||'bv-o')+'">'+s+'</span>';}

function toast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(err?' err':'')+' show';
  setTimeout(function(){t.classList.remove('show');},2800);
}
function openModal(html){document.getElementById('MCONT').innerHTML=html;document.getElementById('MOV').classList.add('open');}
function closeModal(){document.getElementById('MOV').classList.remove('open');}
document.addEventListener('click',function(e){if(e.target.id==='MOV')closeModal();});

async function doLogin(){
  var email=document.getElementById('lEmail').value.trim().toLowerCase();
  var pass=document.getElementById('lPass').value;
  var msg=document.getElementById('loginMsg');
  var btn=document.getElementById('lBtn');
  msg.textContent='';
  if(!email||!pass){msg.textContent='Preenche os campos';return;}
  btn.textContent='A entrar...';btn.disabled=true;
  try{
    var users=await api('digi_users','GET',null,'?email=eq.'+encodeURIComponent(email)+'&select=*');
    if(!users.length){msg.textContent='Email não encontrado';btn.textContent='Entrar';btn.disabled=false;return;}
    var u=users[0];
    if(u.password_hash!==pass){msg.textContent='Password incorreta';btn.textContent='Entrar';btn.disabled=false;return;}
    if(!u.ativo){msg.textContent='Conta desativada';btn.textContent='Entrar';btn.disabled=false;return;}
    CU=u;
    document.getElementById('loginScreen').style.display='none';
    var app=document.getElementById('app');app.style.display='flex';app.style.flexDirection='column';
    document.getElementById('tName').textContent=CU.nome.split(' ')[0];
    document.getElementById('tRole').textContent=CU.role==='admin'?'Admin':'Consultor';
    buildNav();
    goPage(CU.role==='admin'?'aDash':'dash');
  }catch(e){msg.textContent='Erro: '+e.message;btn.textContent='Entrar';btn.disabled=false;}
}
function doLogout(){CU=null;if(CLK)clearInterval(CLK);document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';}

var cNav=[
  {id:'dash',svg:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',label:'Início'},
  {id:'presenca',svg:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',label:'Presença'},
  {id:'porta',svg:'<path d="M3 9v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9"/><rect x="1" y="3" width="22" height="6" rx="1"/>',label:'Porta'},
  {id:'chamadas',svg:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12 19.79 19.79 0 0 1 1.08 3.4 2 2 0 0 1 3.05 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>',label:'Chamadas'},
  {id:'autos',svg:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',label:'Autos'},
  {id:'treino',svg:'<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',label:'Treino'},

function addFiles(files){
  files.filter(function(f){return f.type==='application/pdf'||f.type.startsWith('image/');}).forEach(function(f){
    if(CONTRACTS.find(function(c){return c.name===f.name&&c.size===f.size;}))return;
    CONTRACTS.push({file:f,name:f.name,size:f.size,status:'pending',data:null});
  });
  renderContracts();
  document.getElementById('btnExtract').disabled=CONTRACTS.length===0;
}

function renderContracts(){
  var el=document.getElementById('contractsList');
  if(!CONTRACTS.length){el.innerHTML='';return;}
  el.innerHTML=CONTRACTS.map(function(c,i){
    var statusColor={pending:'var(--muted)',extracting:'var(--yellow)',done:'var(--blue)',error:'var(--red)'}[c.status]||'var(--muted)';
    var statusLabel={pending:'Aguarda',extracting:'A extrair...',done:'Extraído',error:'Erro'}[c.status]||'';
    var dataHtml='';
    if(c.status==='done'&&c.data){
      var d=c.data;
      dataHtml='<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">'
        +field('Nome',d.nome)+field('NIF',d.nif)+field('BI/CC',d.bi)
        +field('Data Nasc.',d.data_nascimento)+field('Telefone',d.telefone)
        +field('Morada',d.morada)+field('Serviços',d.servicos)
        +field('Ref. Pedido',d.ref_pedido)+field('Data Contrato',d.data_contrato)
        +'</div>';
    }
    if(c.status==='error'){dataHtml='<div style="color:var(--red);font-size:11px;margin-top:8px">'+c.error+'</div>';}
    return'<div class="contract-card '+(c.status==='extracting'?'extracting':c.status==='done'?'done':c.status==='error'?'err':'')+'">'
      +'<div style="display:flex;align-items:center;gap:10px">'
        +'<span style="font-size:20px">'+(c.file.type==='application/pdf'?'📄':'🖼')+'</span>'
        +'<span style="flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+c.name+'</span>'
        +'<span style="font-size:10px;font-weight:700;color:'+statusColor+'">'+statusLabel+'</span>'
        +(c.status==='pending'?'<button class="btn btn-d btn-sm" onclick="removeContract('+i+')" style="padding:3px 8px">×</button>':'')
      +'</div>'
      +dataHtml
      +'</div>';
  }).join('');
}

function field(label,val){
  if(!val||val==='N/A'||val==='—')return'';
  return'<div class="contract-field"><span class="cf-label">'+label+'</span><span class="cf-val">'+val+'</span></div>';
}

window.removeContract=function(i){CONTRACTS.splice(i,1);renderContracts();document.getElementById('btnExtract').disabled=CONTRACTS.length===0;};
window.clearContracts=function(){CONTRACTS=[];renderContracts();document.getElementById('btnExtract').disabled=true;document.getElementById('btnXls').disabled=true;};

window.extractAll=async function(){
  var btn=document.getElementById('btnExtract');
  btn.disabled=true;btn.textContent='A processar...';
  var pending=CONTRACTS.filter(function(c){return c.status==='pending';});
  var done=0;
  var pa=document.getElementById('progressArea');
  pa.innerHTML='<div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>';
  for(var i=0;i<pending.length;i++){
    var c=pending[i];
    c.status='extracting';renderContracts();
    try{
      var b64=await toB64(c.file);
      var mtype=c.file.type==='application/pdf'?'application/pdf':(c.file.type||'image/jpeg');
      c.data=await extractContract(b64,mtype);
      c.status='done';
    }catch(e){c.status='error';c.error=e.message;}
    done++;
    var pf=document.getElementById('pFill');
    if(pf)pf.style.width=(done/pending.length*100)+'%';
    renderContracts();
  }
  btn.textContent='⚡ Extrair com IA';btn.disabled=false;
  var hasDone=CONTRACTS.some(function(c){return c.status==='done';});
  document.getElementById('btnXls').disabled=!hasDone;
  toast('✅ Extração concluída! '+done+' ficheiros processados');
};

function toB64(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){res(r.result.split(',')[1]);};
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

async function extractContract(b64, mtype) {
  var pdfData = atob(b64);
  var uint8 = new Uint8Array(pdfData.length);
  for (var i = 0; i < pdfData.length; i++) uint8[i] = pdfData.charCodeAt(i);
  var loadTask = pdfjsLib.getDocument({data: uint8});
  var pdf = await loadTask.promise;
  var fullText = '';
  for (var p = 1; p <= pdf.numPages; p++) {
    var page = await pdf.getPage(p);
    var tc = await page.getTextContent();
    fullText += tc.items.map(function(i){return i.str;}).join(' ') + '\n';
  }
  var t = fullText;

  // Helper: get value after a label, stops at next label or line end
  function after(label, maxLen) {
    maxLen = maxLen || 80;
    var idx = t.indexOf(label);
    if (idx === -1) return '';
    var rest = t.substring(idx + label.length).trim();
    // Remove leading * or : or spaces
    rest = rest.replace(/^[\*:\s]+/, '');
    // Take until next all-caps label or newline
    var val = rest.substring(0, maxLen);
    // Cut at known separators
    var cuts = ['NIF', 'Doc.', 'Morada', 'Distrito', 'Localidade', 'Data de', 'Tel.', 'E-mail', 'Tipo de', 'Declaro', 'AUTORIZA', 'Produto', 'Período', 'Nome do', '\n'];
    cuts.forEach(function(c) {
      var ci = val.indexOf(c);
      if (ci > 2) val = val.substring(0, ci);
    });
    return val.trim();
  }

  // Nome do cliente - between "denominação social*" and "Nacionalidade"
  var nome = after('denominação social*', 60);
  if (!nome) nome = after('Nome completo ou denominação social', 60);

  // NIF do cliente - "NIF*" followed by 9 digits (ignore NIPC 516222201 da DIGI)
  var nifMatch = t.match(/NIF\*\s*([0-9]{9})\b/);
  var nif = nifMatch ? nifMatch[1] : '';
  // Make sure it's not DIGI's NIF
  if (nif === '516222201') {
    var nifAll = t.match(/NIF\*\s*([0-9]{9})\b/g) || [];
    nif = '';
    nifAll.forEach(function(m) {
      var n = m.match(/([0-9]{9})/)[1];
      if (n !== '516222201') nif = n;
    });
  }

  // BI / CC number - after "Nº*"
  var biMatch = t.match(/N[º\u00ba]\*\s*([0-9]{7,12})\b/);
  var bi = biMatch ? biMatch[1] : '';

  // Data nascimento - after "Data de nascimento*"
  var dnMatch = t.match(/Data de nascimento\*\s*([0-9]{2}[-\/][0-9]{2}[-\/][0-9]{4})/i);
  var dn = dnMatch ? dnMatch[1] : '';

  // Telefone - after "Tel. de contacto*"
  var telMatch = t.match(/Tel\. de contacto\*\s*([0-9]{9})/i);
  var tel = telMatch ? telMatch[1] : '';

  // Email - after "E-mail*"
  var emailMatch = t.match(/E-mail\*\s*([A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,})/i);
  var email = emailMatch ? emailMatch[1] : '';

  // Morada - after "Morada de Instação*" (note: DIGI has typo "Instação")
  var moradaRua = after('Morada de Insta', 80);
  var distrito = after('Distrito*', 30);
  var localidade = after('Localidade*', 30);
  var cp = t.match(/C[oó]digo Postal\*\s*([0-9]{4}-[0-9]{3})/i);
  var morada = moradaRua;
  if (localidade) morada += ', ' + localidade;
  if (cp) morada += ' ' + cp[1];

  // Serviços contratados - find all "Produto X" lines
  var prodMatches = t.match(/Produto\s+([A-Za-zÀ-ú0-9 ]{3,40}?)(?:\s+Per[ií]odo|\s+Alter)/g) || [];
  var prods = prodMatches.map(function(m) {
    return m.replace(/Produto\s+/, '').replace(/\s+Per[ií]odo.*/, '').replace(/\s+Alter.*/, '').trim();
  }).filter(function(p) { return p.length > 1; });
  // Also check "Nome do serviço" line on page 2
  var nomeServMatch = t.match(/Nome do servi[çc]o\s+([^\n]{5,60})/i);
  var servicos = prods.length ? prods.join(' + ') : (nomeServMatch ? nomeServMatch[1].trim() : '');

  // Ref pedido - "Número" + "Data" header area (first page, contract number)
  var refMatch = t.match(/\b(329[0-9]{6,9})\b/);
  var ref = refMatch ? refMatch[1] : '';

  // Data contrato - after "Data" near the top, format DD/MM/YYYY or DD-MM-YYYY
  var dcMatch = t.match(/\b([0-9]{2}[\/\-][0-9]{2}[\/\-][0-9]{4})\b/);
  var dc = dcMatch ? dcMatch[1] : '';

  // Total mensal
  var totalMatch = t.match(/Total[:\s]*([0-9]+,[0-9]+\s*€|[0-9]+\s*€)/i);
  var total = totalMatch ? totalMatch[1] : '';

  return {
    nome: nome,
    nif: nif,
    bi: bi,
    data_nascimento: dn,
    telefone: tel,
    email: email,
    morada: morada,
    servicos: servicos,
    ref_pedido: ref,
    data_contrato: dc,
    total_mensal: total
  };
}

window.submitContrato=async function(){
  var d=window._contractData||{};
  var nome=d.nome||'',nif=d.nif||'',ref=d.ref||'',dc=d.dc||'',qtd=d.qtd||1,svcs=d.servicos||'',tel=d.tel||'',morada=d.morada||'';
  var st=document.getElementById('cStatus');
  st.innerHTML='<div style="color:var(--yellow);font-size:12px;padding:8px"><span class="spin"></span> A submeter...</div>';
  try{
    // Check if NIF already exists for this user
    var existing=await api('digi_autos','GET',null,'?user_id=eq.'+CU.id+'&ref_pedido=eq.'+ref);
    if(existing.length){
      st.innerHTML='<div style="color:var(--yellow);font-size:12px;padding:8px">⚠️ Este contrato (ref. '+ref+') já foi submetido.</div>';
      return;
    }
    var va=await api('digi_autos','GET',null,'?user_id=eq.'+CU.id+'&status=eq.Validado');
    var pat=getPat(va.length);
    await api('digi_autos','POST',{
      user_id:CU.id,
      ref_pedido:ref,
      nome_cliente:nome,
      qtd:qtd,
      data_pedido:dc?dc.split('/').reverse().join('-'):today(),
      status:'Novo',
      servicos:svcs,
      comissao_valor:calcCom(qtd,pat),
      patamar:pat.label
    });
    toast('✅ Contrato submetido! Aguarda validação do admin.');
    st.innerHTML='';
    document.getElementById('cFile').value='';
    pages.autos();
  }catch(e){
    st.innerHTML='<div style="color:var(--red);font-size:12px;padding:8px">Erro: '+e.message+'</div>';
  }
};


window.cancelContrato=function(){
  var s=document.getElementById('cStatus');if(s)s.innerHTML='';
  var f=document.getElementById('cFile');if(f)f.value='';
  window._contractData=null;
};
window.exportContractsXls=function(){
  var done=CONTRACTS.filter(function(c){return c.status==='done'&&c.data;});
  if(!done.length){toast('Sem dados para exportar',true);return;}
  var wb=XLSX.utils.book_new();
  var rows=[['Nome','NIF','BI/CC','Data Nasc.','Telefone','Email','Morada','Serviços','Ref. Pedido','Data Contrato','Total Mensal','Ficheiro']];
  done.forEach(function(c){
    var d=c.data;
    rows.push([d.nome,d.nif,d.bi,d.data_nascimento,d.telefone,d.email,d.morada,d.servicos,d.ref_pedido,d.data_contrato,d.total_mensal||'',c.name]);
  });
  var ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:28},{wch:12},{wch:14},{wch:13},{wch:14},{wch:24},{wch:36},{wch:24},{wch:14},{wch:14},{wch:12},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws,'Contratos DIGI');

  XLSX.writeFile(wb,'Contratos_DIGI_'+date+'.xlsx');

};

function updateFunnel(ph){

function setQR(opts){

function showThink(){
  const msgs=document.getElementById('chatMessages');if(!msgs)return;

}
function hideThink(){const el=document.getElementById('tmsg');if(el)el.remove();}

async function sendMsg(){
  if(simState.isThinking)return;
  const inp=document.getElementById('chatInput');if(!inp)return;
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';simState.turns++;simState.isThinking=true;
  document.getElementById('sendBtn').disabled=true;
  document.getElementById('quickReplies').innerHTML='';
  addMsg('user',txt);
  document.getElementById('st-score').textContent=simState.score+' pts';
  showThink();
  simState.history.push({role:'user',content:txt});
  try{
    const r=await callGroq(txt);
    hideThink();simState.score+=r.scoreDelta;
    document.getElementById('st-score').textContent=simState.score+' pts';
    if(r.newPhase>simState.phase)updateFunnel(r.newPhase);
    addMsg('client',r.clientReply,r.feedback,r.scoreDelta);
    simState.history.push({role:'assistant',content:r.clientReply});
    if(r.quickReplies&&r.quickReplies.length)setQR(r.quickReplies);
    renderMetrics();
    if(r.ended)setTimeout(()=>endSim(r.finalSummary),1200);
  }catch(e){hideThink();addSysMsg('⚠️ '+e.message);}
  simState.isThinking=false;document.getElementById('sendBtn').disabled=false;
}

async function callGroq(userMsg){
  const c=simState.client;
  const hist=simState.history.slice(0,-1).map(m=>`${m.role==='user'?'CONSULTOR':'CLIENTE'}: ${m.content}`).join('\n');
  const sys=`${c.sp}\n\nInstruções: És simultaneamente CLIENTE e AVALIADOR. Responde APENAS com JSON válido:\n{"clientReply":"resposta pt-PT max 3 frases","feedback":"análise 1-2 frases","scoreDelta":10,"newPhase":${simState.phase},"quickReplies":["s1","s2","s3"],"ended":false,"finalSummary":""}\nscoreDelta 0-25. newPhase 0-4. ended:true só se aceitou ou recusou definitivamente.\nFase: ${PHASES[simState.phase]} | Score: ${simState.score}\n${hist?'Histórico:\n'+hist:'(início)'}`;
  const k=['gsk_tJ3vG71Yez9w','yW5ipxgkWGdyb3FY','rSu1lIezoqMOFUrBtDcWGiZV'].join('');
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},body:JSON.stringify({model:'meta-llama/llama-4-scout-17b-16e-instruct',messages:[{role:'system',content:sys},{role:'user',content:userMsg}],temperature:.7,max_tokens:500,response_format:{type:'json_object'}})});
  if(!res.ok)throw new Error('Groq '+res.status);
  const data=await res.json();
  const raw=data?.choices?.[0]?.message?.content||'{}';
  const parsed=JSON.parse(raw.match(/\{[\s\S]*\}/)?.[0]||'{}');
  parsed.scoreDelta=Math.max(0,Math.min(25,parseInt(parsed.scoreDelta)||5));
  parsed.newPhase=Math.max(simState.phase,Math.min(4,parseInt(parsed.newPhase)??simState.phase));
  if(!Array.isArray(parsed.quickReplies))parsed.quickReplies=[];
  if(!parsed.clientReply)parsed.clientReply=raw.slice(0,200);
  if(simState.phase===0)simState.metrics.abertura=Math.min(25,simState.metrics.abertura+parsed.scoreDelta);
  else if(simState.phase===1)simState.metrics.diagnostico=Math.min(25,simState.metrics.diagnostico+parsed.scoreDelta);
  else if(simState.phase===3)simState.metrics.objections=Math.min(25,simState.metrics.objections+parsed.scoreDelta);
  else if(simState.phase===4)simState.metrics.fecho=Math.min(25,simState.metrics.fecho+parsed.scoreDelta);
  return parsed;
}

function renderTComissoes(){
  const el=document.getElementById('tContent');if(!el)return;
  const mkT=(title,data,color)=>`<div style="margin-bottom:14px"><div style="font-size:13px;font-weight:700;color:${color};margin-bottom:6px">${title}</div><div style="overflow-x:auto;background:var(--white);border-radius:12px;border:1px solid var(--border)"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:${color};color:#fff"><th style="padding:9px 12px;text-align:left;font-weight:700;font-size:11px">Escalão</th><th style="padding:9px 12px;font-weight:700;font-size:11px">Comissão</th></tr></thead><tbody>${data.map((r,i)=>`<tr style="border-bottom:1px solid var(--border);${i%2?'background:var(--bg)':''}"><td style="padding:9px 12px">${r.l}</td><td style="padding:9px 12px;font-weight:800;color:${color}">${r.v}€</td></tr>`).join('')}</tbody></table></div></div>`;
  el.innerHTML=
    mkT('📺 TV DIGI',[{l:'Por activação',v:6}],'var(--blue)')+
    mkT('🌐 Fibra DIGI',[{l:'1 a 5',v:6},{l:'6 a 10',v:8},{l:'11 a 15',v:10},{l:'16 a 20',v:15},{l:'21 a 50',v:20},{l:'51 a 75',v:20},{l:'75+',v:20}],'var(--blue)')+
    mkT('📱 Móvel DIGI',[{l:'1 a 50',v:2},{l:'51 a 75',v:2.5},{l:'75+',v:3}],'var(--green)')+
    mkT('☎️ Fixo DIGI',[{l:'Por activação',v:1}],'var(--muted)')+
    `<div style="background:var(--white);border-radius:16px;padding:18px;box-shadow:0 2px 16px rgba(0,0,0,.08)">
      <div style="font-size:13px;font-weight:700;color:var(--blue);margin-bottom:14px">💶 Calculadora</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
        <div><label style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;display:block;margin-bottom:5px">Total Adesões</label><input class="fi" id="c-ades" type="number" min="0" placeholder="20" oninput="calcComT()"></div>
        <div><label style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;display:block;margin-bottom:5px">TVs</label><input class="fi" id="c-tv" type="number" min="0" placeholder="0" oninput="calcComT()"></div>
        <div><label style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;display:block;margin-bottom:5px">Fibras</label><input class="fi" id="c-fib" type="number" min="0" placeholder="0" oninput="calcComT()"></div>
        <div><label style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;display:block;margin-bottom:5px">Móveis</label><input class="fi" id="c-mov" type="number" min="0" placeholder="0" oninput="calcComT()"></div>
      </div>
      <div id="calcResult" style="display:none;background:linear-gradient(135deg,var(--blue),var(--blue2));border-radius:12px;padding:16px;color:#fff">
        <div style="font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Estimativa</div>
        <div style="font-size:40px;font-weight:900;letter-spacing:-2px" id="cr-val">0€</div>
        <div style="font-size:12px;opacity:.65;margin-top:4px" id="cr-det"></div>
      </div>
    </div>`;
}
window.calcComT=()=>{
  const g=id=>parseInt(document.getElementById(id)?.value)||0;
  const tv=g('c-tv'),fib=g('c-fib'),mov=g('c-mov');
  const res=document.getElementById('calcResult');if(!res)return;
  if(!tv&&!fib&&!mov){res.style.display='none';return;}
  const fp=getPat(fib);const mp=getPat(mov);
  const total=tv*6+fib*fp.f+mov*mp.m;
  res.style.display='block';
  document.getElementById('cr-val').textContent=total.toFixed(2).replace('.',',')+'€';
  document.getElementById('cr-det').innerHTML=[tv&&tv+'×TV(6€)',fib&&fib+'×Fibra('+fp.f+'€)',mov&&mov+'×Móvel('+mp.m+'€)'].filter(Boolean).join(' + ');
};

function renderTManual(){

  let tab=0;
  const render=(i)=>{
    document.querySelectorAll('#mTabs div').forEach((t,j)=>{const a=j===i;t.style.borderColor=a?'var(--blue)':'var(--border)';t.style.background=a?'var(--blue-light)':'var(--white)';t.style.color=a?'var(--blue)':'var(--muted)';});
